<!DOCTYPE html>
<html lang="en">
<head>
    <title>Global News Headlines</title>

    <style>
        body {
            font-family: Arial, serif;
            max-width: 800px;
            margin: 40px auto;
        }

        h1 {
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }

        .news-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 15px 0;
            border-radius: 6px;
        }

        .publisher {
            font-weight: bold;
            margin-bottom: 6px;
        }
    </style>
</head>

<body>

    <h1>Top Headlines from Trusted Publishers</h1>

    <div id="news"></div>

    <script>
        async function loadHeadlines() {
            const res = await fetch("/headlines");
            const data = await res.json();

            const container = document.getElementById("news");
            container.innerHTML = "";

            data.headlines.forEach(item => {
                const div = document.createElement("div");
                div.className = "news-card";

                div.innerHTML = `
                    <div class="publisher">${item.publisher}</div>
                    <div class="headline">${item.headline}</div>
                `;

                container.appendChild(div);
            });
        }

        loadHeadlines();
    </script>

</body>
</html>
