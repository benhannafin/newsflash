<!DOCTYPE html>
<html lang="en">
<head>
  <title>Top Global Headlines</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
    }

    h1 {
      border-bottom: 2px solid black;
      padding-bottom: 10px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 15px 0;
      border-radius: 6px;
    }

    .publisher {
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }

    a {
      text-decoration: none;
      color: #0066cc;
    }

    a:hover {
      text-decoration: underline;
    }

  </style>

</head>

<body>

<h1>Top Headlines from Trusted Publishers</h1>

<div id="news"></div>

<script>

async function loadHeadlines() {

  const res = await fetch("/headlines");
  const data = await res.json();

  const container = document.getElementById("news");
  container.innerHTML = "";

  data.headlines.forEach(item => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <div class="publisher">${item.publisher}</div>
        <a href="${item.url}" target="_blank">${item.headline}</a>
    `;

    container.appendChild(div);

  });

}

loadHeadlines();

</script>

</body>
</html>
